<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国股市编年史 — Demo</title>
<style>
:root {
  --bg-primary: #0b0d11;
  --bg-card: #14171d;
  --bg-hover: #1b1f28;
  --border: #262a35;
  --text-primary: #e6e3dc;
  --text-secondary: #a8a59b;
  --text-tertiary: #6e6b62;
  --accent: #c9a350;
  --accent-blue: #5a9fd4;
  --green: #4daf91;
  --red: #e05660;
  --orange: #d48540;
  --purple: #9b7ec4;
  --cyan: #4db8b0;
  --yellow: #d4a843;
  --radius: 8px;
  --radius-sm: 5px;
  --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 16px; line-height: 1.7; overflow-x: hidden;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* ---- Header ---- */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,13,17,0.94); border-bottom: 1px solid var(--border);
  padding: 14px 32px; display: flex; align-items: center; gap: 20px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.header h1 {
  font-size: 20px; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap;
  background: linear-gradient(135deg, var(--text-primary) 0%, #c9a350 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-right { display: flex; align-items: center; gap: 20px; margin-left: auto; flex-shrink: 0; }
.header-stat { font-size: 13px; color: var(--text-tertiary); letter-spacing: 0.02em; }
.header-stat strong { color: var(--text-primary); font-size: 15px; font-weight: 600; }
.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
.status-dot.live { background: var(--green); box-shadow: 0 0 6px rgba(77,175,145,0.4); }
.btn-auth {
  font-size: 13px; padding: 7px 16px; border-radius: 6px; cursor: pointer; white-space: nowrap;
  border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary);
  transition: all 0.2s; font-family: var(--font); font-weight: 500;
}
.btn-auth:hover { border-color: var(--accent); color: var(--accent); background: rgba(201,163,80,0.06); }
.btn-auth.logged-in { border-color: rgba(77,175,145,0.4); color: var(--green); background: rgba(77,175,145,0.06); }

/* ---- Layout ---- */
.app { display: flex; max-width: 1520px; margin: 0 auto; height: calc(100vh - 61px); }

/* ---- Sidebar ---- */
.sidebar {
  width: 400px; flex-shrink: 0; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: rgba(11,13,17,0.5);
}

/* ---- Today in History ---- */
.today-panel {
  padding: 14px 24px; border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(201,163,80,0.04) 0%, rgba(201,163,80,0.01) 100%);
  cursor: pointer; transition: all 0.25s;
}
.today-panel:hover { background: linear-gradient(135deg, rgba(201,163,80,0.08) 0%, rgba(201,163,80,0.02) 100%); }
.today-header { display: flex; justify-content: space-between; align-items: center; }
.today-header .label {
  font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.today-header .label::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.today-header .date { font-size: 13px; color: var(--text-tertiary); }
.today-items { margin-top: 8px; }
.today-item { font-size: 14px; color: var(--text-secondary); line-height: 1.5; padding: 3px 0; }
.today-item .t-year { color: var(--text-tertiary); margin-right: 8px; font-weight: 500; font-size: 13px; }
.today-empty { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }

/* Chart */
.chart-panel { padding: 20px 24px 14px; border-bottom: 1px solid var(--border); position: relative; }
.chart-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.chart-label .title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.chart-label .sub { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
.chart-panel canvas { width: 100%; border-radius: 6px; cursor: crosshair; }
.chart-toggle-row { display: flex; gap: 5px; margin-bottom: 8px; }
.chart-btn {
  font-size: 11px; padding: 4px 12px; border-radius: 12px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg-card); color: var(--text-tertiary);
  transition: all 0.2s; font-family: var(--font); font-weight: 500;
}
.chart-btn:hover { border-color: var(--accent); color: var(--accent); }
.chart-btn.on { background: var(--accent); color: #1a1a1a; border-color: var(--accent); font-weight: 600; }

/* Tooltip */
.chart-tooltip {
  position: fixed; pointer-events: none; z-index: 200;
  background: rgba(20,23,29,0.97); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; font-size: 12px; font-variant-numeric: tabular-nums;
  display: none; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.chart-tooltip .tt-date { color: var(--text-tertiary); font-size: 11px; margin-bottom: 2px; }
.chart-tooltip .tt-val { color: var(--text-primary); font-weight: 700; font-size: 14px; }

/* Tabs */
.tab-bar { display: flex; border-bottom: 1px solid var(--border); }
.tab-bar .tab {
  flex: 1; text-align: center; padding: 14px 0; font-size: 14px; font-weight: 600;
  color: var(--text-tertiary); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; user-select: none; letter-spacing: 0.03em;
}
.tab-bar .tab:hover { color: var(--text-primary); background: rgba(201,163,80,0.03); }
.tab-bar .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Search */
.search-wrap { padding: 12px 24px; border-bottom: 1px solid var(--border); }
.search-wrap input {
  width: 100%; padding: 10px 14px; font-size: 14px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary);
  font-family: var(--font); outline: none; transition: all 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,163,80,0.08); }
.search-wrap input::placeholder { color: var(--text-tertiary); }

/* Filter bar */
.filter-bar {
  padding: 12px 24px 14px; border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 8px;
}
.filter-chip {
  font-size: 13px; padding: 6px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
  white-space: nowrap; user-select: none; font-weight: 500;
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(201,163,80,0.06); }
.filter-chip.active { background: var(--accent); color: #1a1a1a; border-color: var(--accent); font-weight: 700; }

/* Event list */
.event-list-scroll { flex: 1; overflow-y: auto; padding: 0 20px 40px; }
.timeline-track { position: relative; padding-left: 36px; }
.timeline-line { position: absolute; left: 16px; top: 0; bottom: 0; width: 1.5px; background: var(--border); opacity: 0.6; }

/* Year separator */
.year-separator {
  position: relative; margin: 22px 0 14px; left: -36px; padding-left: 36px;
  font-size: 20px; font-weight: 800; color: var(--text-primary); letter-spacing: 0.06em;
}
.year-separator::before {
  content: ''; position: absolute; left: 9px; top: 50%; width: 15px; height: 15px;
  border-radius: 50%; background: var(--accent); border: 3px solid var(--bg-primary);
  transform: translateY(-50%); box-shadow: 0 0 8px rgba(201,163,80,0.3);
}

/* Event card */
.event-card {
  position: relative; margin: 10px 0; padding: 18px 20px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
  border-left: 3px solid transparent;
}
.event-card:hover {
  background: var(--bg-hover);
  border-color: rgba(201,163,80,0.3);
  border-left-color: var(--accent);
  transform: translateX(2px);
}
.event-card .dot {
  position: absolute; left: -26px; top: 22px;
  width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--bg-primary);
  box-shadow: 0 0 6px rgba(0,0,0,0.4);
}
.event-card .fav-star {
  position: absolute; right: 14px; top: 14px;
  font-size: 17px; cursor: pointer; opacity: 0.25; transition: all 0.2s; user-select: none;
}
.event-card .fav-star:hover { opacity: 0.85; transform: scale(1.15); }
.event-card .fav-star.on { opacity: 1; color: var(--yellow); }
.event-date { font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; font-variant-numeric: tabular-nums; font-weight: 500; }
.event-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.event-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 12px; color: #fff; white-space: nowrap;
  flex-shrink: 0; font-weight: 600; letter-spacing: 0.03em;
}
.cycle-ref {
  font-size: 11px; padding: 3px 10px; border-radius: 12px; white-space: nowrap; flex-shrink: 0;
  cursor: pointer; transition: all 0.2s; user-select: none; font-weight: 500;
}
.cycle-ref.bull { background: rgba(77,175,145,0.1); color: var(--green); border: 1px solid rgba(77,175,145,0.2); }
.cycle-ref.bear { background: rgba(224,86,96,0.1); color: var(--red); border: 1px solid rgba(224,86,96,0.2); }
.cycle-ref:hover { filter: brightness(1.3); }
.event-title { font-size: 17px; font-weight: 700; line-height: 1.45; flex: 1; min-width: 180px; }
.event-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-top: 6px;
}
.event-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 13px; color: var(--text-tertiary); }
.event-footer .index-value { color: var(--accent); font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums; }
.event-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.tag-chip {
  font-size: 11px; padding: 3px 10px; border-radius: 10px;
  background: rgba(201,163,80,0.08); color: var(--accent);
  cursor: pointer; transition: all 0.15s; white-space: nowrap; font-weight: 500;
}
.tag-chip:hover { background: rgba(201,163,80,0.18); }

/* ---- Detail Panel ---- */
.detail-panel { flex: 1; overflow-y: auto; padding: 48px 56px; display: flex; justify-content: center; }
.detail-empty { text-align: center; color: var(--text-tertiary); margin-top: 140px; }
.detail-empty .icon { font-size: 80px; margin-bottom: 24px; opacity: 0.2; }
.detail-empty p { font-size: 17px; font-weight: 500; }
.detail-content { max-width: 740px; width: 100%; }
.detail-content .kicker {
  font-size: 13px; color: var(--text-tertiary); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 8px; display: flex; align-items: center;
  gap: 12px; font-weight: 600;
}
.detail-content .kicker .fav-star-big { font-size: 22px; cursor: pointer; opacity: 0.3; transition: all 0.2s; }
.detail-content .kicker .fav-star-big:hover { opacity: 0.9; transform: scale(1.1); }
.detail-content .kicker .fav-star-big.on { opacity: 1; color: var(--yellow); }
.detail-content h2 { font-size: 30px; font-weight: 800; margin-bottom: 24px; line-height: 1.3; letter-spacing: 0.02em; }
.detail-content .desc-full { font-size: 17px; color: #d0cec8; line-height: 1.9; margin-bottom: 32px; }
.detail-content .event-tags { margin-bottom: 24px; }

.snapshot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
.snapshot-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px;
}
.snapshot-card .label { font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; font-weight: 500; }
.snapshot-card .value { font-size: 26px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
.snapshot-card .value.negative { color: var(--red); }
.snapshot-card .value.positive { color: var(--green); }

.related-section { margin-top: 12px; }
.related-section h3 { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
.related-card {
  display: block; padding: 16px 20px; margin-bottom: 8px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
}
.related-card:hover { background: var(--bg-hover); border-color: rgba(201,163,80,0.3); }
.related-card .r-date { font-size: 13px; color: var(--text-tertiary); margin-bottom: 3px; font-weight: 500; }
.related-card .r-title { font-size: 15px; font-weight: 600; }

/* ---- Enriched Data Sections ---- */
.enrich-section { margin-bottom: 24px; }
.enrich-section h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
.key-numbers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.kn-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.kn-card .kn-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px; font-weight: 500; }
.kn-card .kn-value { font-size: 17px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.sector-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.sector-chip { font-size: 13px; padding: 5px 14px; border-radius: 16px; font-weight: 600; white-space: nowrap; }
.sector-chip.sector-up { background: rgba(77,175,145,0.1); color: var(--green); border: 1px solid rgba(77,175,145,0.2); }
.sector-chip.sector-down { background: rgba(224,86,96,0.1); color: var(--red); border: 1px solid rgba(224,86,96,0.2); }
.stocks-table { display: flex; flex-direction: column; gap: 4px; }
.stock-row { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; }
.stock-row .stock-name { font-weight: 700; color: var(--text-primary); min-width: 80px; }
.stock-row .stock-code { font-size: 12px; color: var(--text-tertiary); font-family: 'SF Mono', monospace; }
.stock-row .stock-role { flex: 1; color: var(--text-secondary); font-size: 13px; }
.ref-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
.ref-row .ref-link { color: var(--accent-blue); text-decoration: none; font-weight: 500; transition: all 0.15s; }
.ref-row .ref-link:hover { text-decoration: underline; color: var(--accent); }
.ref-row .ref-type { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: rgba(90,159,212,0.1); color: var(--accent-blue); white-space: nowrap; }
.ref-row .ref-date { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }

/* Loading / Error */
.loading { text-align: center; padding: 56px 20px; color: var(--text-tertiary); font-size: 15px; }
.spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 10px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { text-align: center; padding: 56px 20px; color: var(--red); font-size: 15px; }
.error-state small { display: block; margin-top: 8px; color: var(--text-tertiary); }
.no-results { text-align: center; padding: 40px 20px; color: var(--text-tertiary); font-size: 14px; }

/* ---- Compare View ---- */
.compare-wrap { padding: 20px 24px; flex: 1; overflow-y: auto; display: none; }
.compare-wrap.active { display: block; }
.compare-pickers { display: flex; gap: 10px; margin-bottom: 16px; }
.compare-pickers select {
  flex: 1; padding: 10px 12px; font-size: 14px;
  background: var(--bg-card); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 6px;
  font-family: var(--font); cursor: pointer;
}
.compare-pickers select:focus { outline: none; border-color: var(--accent); }
.compare-chart-wrap { margin-bottom: 18px; position: relative; }
.compare-chart-wrap canvas { width: 100%; border-radius: 6px; cursor: crosshair; }
.compare-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.compare-stat {
  padding: 14px 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
}
.compare-stat .s-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 4px; }
.compare-stat .s-values { display: flex; justify-content: space-between; align-items: baseline; }
.compare-stat .s-val { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
.compare-stat .s-val.a { color: var(--accent); }
.compare-stat .s-val.b { color: var(--orange); }
.compare-legend { display: flex; gap: 24px; margin-bottom: 14px; font-size: 13px; }
.compare-legend span { display: flex; align-items: center; gap: 6px; }
.compare-legend .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 3px; }

/* ---- Auth Modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 32px 36px; width: 400px; max-width: 92vw; box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 24px; letter-spacing: 0.02em; }
.modal .field { margin-bottom: 16px; }
.modal .field label { display: block; font-size: 13px; color: var(--text-tertiary); margin-bottom: 5px; font-weight: 500; }
.modal .field input {
  width: 100%; padding: 11px 14px; font-size: 14px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary);
  font-family: var(--font); outline: none; transition: all 0.2s;
}
.modal .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,163,80,0.08); }
.modal .btn-row { display: flex; gap: 12px; margin-top: 24px; }
.modal .btn {
  flex: 1; padding: 11px; font-size: 14px; font-weight: 700; border-radius: 6px;
  cursor: pointer; border: none; font-family: var(--font); transition: all 0.2s;
}
.modal .btn.primary { background: var(--accent); color: #1a1a1a; }
.modal .btn.primary:hover { opacity: 0.85; transform: translateY(-1px); }
.modal .btn.ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.modal .btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
.modal .switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-tertiary); }
.modal .switch a { color: var(--accent); cursor: pointer; font-weight: 600; }
.modal .error { font-size: 12px; color: var(--red); margin-top: 6px; display: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3e48; }

/* ---- Story Mode ---- */
.story-wrap { padding: 0 20px 40px; flex: 1; overflow-y: auto; display: none; }
.story-wrap.active { display: block; }
.story-intro {
  padding: 18px 18px 22px; margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.story-intro h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.story-intro p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
.cycle-card {
  padding: 20px 18px; margin-bottom: 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
  border-left: 4px solid var(--border);
}
.cycle-card:hover { background: var(--bg-hover); border-color: rgba(201,163,80,0.25); }
.cycle-card.bull { border-left-color: var(--green); }
.cycle-card.bear { border-left-color: var(--red); }
.cycle-card .cyc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.cycle-card .cyc-name { font-size: 16px; font-weight: 700; line-height: 1.35; }
.cycle-card .cyc-badge {
  font-size: 11px; padding: 4px 10px; border-radius: 12px; color: #fff; white-space: nowrap; font-weight: 600;
}
.cycle-card .cyc-meta { display: flex; gap: 20px; margin-bottom: 12px; font-size: 13px; color: var(--text-tertiary); }
.cycle-card .cyc-meta span { display: flex; align-items: center; gap: 4px; }
.cycle-card .cyc-meta .val { color: var(--text-primary); font-weight: 600; font-variant-numeric: tabular-nums; }
.cycle-card .cyc-narrative {
  font-size: 14px; color: var(--text-secondary); line-height: 1.75;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 12px;
}
.cycle-card .cyc-events { display: flex; flex-wrap: wrap; gap: 6px; }
.cycle-card .cyc-event-tag {
  font-size: 12px; padding: 4px 12px; border-radius: 12px;
  background: rgba(201,163,80,0.08); color: var(--accent);
  cursor: pointer; transition: all 0.15s; font-weight: 500;
}
.cycle-card .cyc-event-tag:hover { background: rgba(201,163,80,0.18); }
.story-detail { display: none; padding: 0 20px 40px; flex: 1; overflow-y: auto; }
.story-detail.active { display: block; }
.story-detail .cyc-narrative { margin-bottom: 20px; }
.story-detail .cyc-events-section h4 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); }
.story-detail .cyc-event-card {
  display: block; padding: 14px 16px; margin-bottom: 8px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
}
.story-detail .cyc-event-card:hover { background: var(--bg-hover); border-color: rgba(201,163,80,0.25); }
.story-detail .cyc-event-card .ce-date { font-size: 12px; color: var(--text-tertiary); margin-bottom: 2px; }
.story-detail .cyc-event-card .ce-title { font-size: 14px; font-weight: 600; }

/* ---- Stats Dashboard ---- */
.stats-wrap { padding: 12px 20px 40px; flex: 1; overflow-y: auto; display: none; }
.stats-wrap.active { display: block; }
.stats-section { margin-bottom: 24px; }
.stats-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.stats-section h3 .s-icon { font-size: 17px; }
.stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.stats-table th { text-align: left; padding: 8px 10px; color: var(--text-tertiary); font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--border); letter-spacing: 0.03em; }
.stats-table td { padding: 8px 10px; border-bottom: 1px solid rgba(38,42,53,0.5); }
.stats-table tr:hover td { background: rgba(201,163,80,0.03); }
.stats-table .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
.stats-table .up { color: var(--green); }
.stats-table .down { color: var(--red); }
.stats-table .dim { color: var(--text-tertiary); }
.stats-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.stats-bar-label { width: 110px; font-size: 12px; text-align: right; color: var(--text-secondary); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stats-bar-track { flex: 1; height: 16px; background: var(--bg-card); border-radius: 8px; overflow: hidden; position: relative; }
.stats-bar-fill { height: 100%; border-radius: 8px; transition: width 0.5s; }
.stats-bar-fill.bull { background: linear-gradient(90deg, rgba(77,175,145,0.5), var(--green)); }
.stats-bar-fill.bear { background: linear-gradient(90deg, rgba(224,86,96,0.5), var(--red)); }
.stats-bar-val { width: 75px; font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.stats-bar-val.bull { color: var(--green); }
.stats-bar-val.bear { color: var(--red); }
.stats-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.stats-grid-2 .stats-section { margin-bottom: 0; }
.stats-badge-row { display: flex; flex-wrap: wrap; gap: 6px; }
.stats-badge { font-size: 12px; padding: 5px 12px; border-radius: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-weight: 500; }
.stats-badge:hover { filter: brightness(1.15); }
.stats-year-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.stats-year-label { width: 36px; font-size: 12px; text-align: right; color: var(--text-tertiary); flex-shrink: 0; }
.stats-year-track { flex: 1; height: 10px; background: var(--bg-card); border-radius: 5px; overflow: hidden; }
.stats-year-fill { height: 100%; border-radius: 5px; background: var(--accent); transition: width 0.5s; }
.stats-year-count { width: 24px; font-size: 11px; color: var(--text-tertiary); text-align: right; }

/* Mobile */
@media (max-width: 860px) {
  .app { flex-direction: column; height: auto; }
  .sidebar { width: 100%; border-right: none; max-height: 55vh; }
  .detail-panel { padding: 28px 24px; }
  .detail-content h2 { font-size: 24px; }
}
</style>
</head>
<body>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <h3 id="authTitle">登录</h3>
    <div class="field" id="nameField" style="display:none">
      <label>昵称</label>
      <input type="text" id="authName" placeholder="可选">
    </div>
    <div class="field">
      <label>邮箱</label>
      <input type="email" id="authEmail" placeholder="your@email.com">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="authPassword" placeholder="至少6位">
    </div>
    <div class="error" id="authError"></div>
    <div class="btn-row">
      <button class="btn ghost" id="btnAuthCancel">取消</button>
      <button class="btn primary" id="btnAuthSubmit">登录</button>
    </div>
    <div class="switch" id="authSwitch">
      没有账号？<a id="linkSwitch">立即注册</a>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="chart-tooltip" id="tooltip">
  <div class="tt-date"></div>
  <div class="tt-val"></div>
</div>

<!-- Header -->
<div class="header">
  <h1>中国股市编年史</h1>
  <div class="header-right">
    <div class="header-stat">事件 <strong id="statEvents">—</strong></div>
    <div class="header-stat">周期 <strong id="statCycles">—</strong></div>
    <div class="header-stat">数据 <strong id="statRange">—</strong></div>
    <span id="statusBadge" style="font-size:13px;color:var(--text-tertiary)"><span class="status-dot"></span>连接中</span>
    <button class="btn-auth" id="btnAuth" onclick="handleAuthClick()">登录</button>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Today in History -->
    <div class="today-panel" id="todayPanel" style="display:none">
      <div class="today-header">
        <span class="label">那年今日</span>
        <span class="date" id="todayDate"></span>
      </div>
      <div class="today-items" id="todayItems"></div>
    </div>

    <!-- Mini Chart -->
    <div class="chart-panel">
      <div class="chart-label">
        <span class="title">上证综指</span>
        <span class="sub">1990 — 2026</span>
      </div>
      <div class="chart-toggle-row">
        <button class="chart-btn on" data-mode="line" onclick="setChartMode('line')">折线</button>
        <button class="chart-btn" data-mode="candle" onclick="setChartMode('candle')">K线</button>
        <button class="chart-btn" data-mode="linevol" onclick="setChartMode('linevol')">折线+量</button>
      </div>
      <canvas id="miniChart" height="170"></canvas>
      <canvas id="volChart" height="40" style="margin-top:2px;display:none"></canvas>
    </div>

    <!-- Tabs -->
    <div class="tab-bar" id="tabBar">
      <div class="tab active" data-tab="timeline">时间线</div>
      <div class="tab" data-tab="story">故事线</div>
      <div class="tab" data-tab="compare">事件对比</div>
      <div class="tab" data-tab="stats">数据看板</div>
    </div>

    <!-- Search -->
    <div class="search-wrap" id="searchWrap">
      <input type="search" id="searchInput" placeholder="搜索事件标题、描述或标签..." oninput="onSearch()">
    </div>

    <!-- Filters -->
    <div class="filter-bar" id="filterBar"></div>

    <!-- Event List -->
    <div class="event-list-scroll" id="eventList">
      <div class="loading"><span class="spinner"></span>加载中...</div>
    </div>

    <!-- Compare View -->
    <!-- Story View -->
    <div class="story-wrap" id="storyView">
      <div class="loading"><span class="spinner"></span>加载故事线...</div>
    </div>

    <!-- Stats View -->
    <div class="stats-wrap" id="statsView">
      <div class="loading"><span class="spinner"></span>加载统计数据...</div>
    </div>

    <div class="compare-wrap" id="compareView">
      <div class="compare-pickers">
        <select id="cmpEventA"><option value="">— 选择事件A —</option></select>
        <select id="cmpEventB"><option value="">— 选择事件B —</option></select>
      </div>
      <div class="compare-legend">
        <span><i class="swatch" style="background:#c9a350"></i> 事件A</span>
        <span><i class="swatch" style="background:#d48540"></i> 事件B</span>
      </div>
      <div class="compare-chart-wrap">
        <canvas id="compareChart" height="280"></canvas>
      </div>
      <div class="compare-stats" id="compareStats"></div>
    </div>
  </div>

  <!-- Detail -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <div class="icon">&#x1F4C8;</div>
      <p>选择左侧事件查看详情</p>
    </div>
  </div>
</div>

<script>
// ============================================================================
// State
// ============================================================================
const API = '';
let allEvents = [], allCycles = [], dailyData = [];
let activeCategory = 'all', searchTerm = '', chartMode = 'line';
let authToken = localStorage.getItem('jwt_token');
let userInfo = null;
let favorites = new Set();
let sampledForChart = [];

const CATEGORIES = [
  { key: 'all', label: '全部', color: '#c9a350' },
  { key: 'milestone', label: '里程碑', color: '#5a9fd4' },
  { key: 'bull', label: '牛市', color: '#4daf91' },
  { key: 'bear', label: '熊市', color: '#e05660' },
  { key: 'crash', label: '崩盘', color: '#d48540' },
  { key: 'regulation', label: '监管', color: '#9b7ec4' },
  { key: 'reform', label: '改革', color: '#4db8b0' },
  { key: 'scandal', label: '黑天鹅', color: '#d4a843' },
];
const catMap = {};
CATEGORIES.forEach(c => { catMap[c.key] = c; });

const TAG_CN = {
  'milestone':'里程碑','bull':'牛市','bear':'熊市','crash':'崩盘','regulation':'监管',
  'reform':'改革','scandal':'黑天鹅','ipo':'IPO','volatility':'波动','peak':'顶点',
  'trough':'低谷','policy-intervention':'政策干预','market-surge':'市场暴涨',
  'market-manipulation':'市场操纵','tech-bubble':'科技泡沫','financial-crisis':'金融危机',
  'external-shock':'外部冲击','rescue-policy':'救市','price-liberalization':'价格放开',
  'price-limit':'涨跌停','delisting':'退市','st-system':'ST制度',
  'institutional-building':'制度建设','institutional-investor':'机构投资者',
  'legal-framework':'法规框架','trading-rule':'交易规则','speculation':'投机',
  'exchange-foundation':'交易所成立','shenzhen':'深圳','index':'指数',
  'internationalization':'国际化','social-unrest':'社会动荡','political-event':'政治事件',
  'bond':'债券','futures':'期货','fund':'基金','policy-driven':'政策驱动',
  'southern-tour':'南巡',
};

function tagLabel(t) { return TAG_CN[t] || t.replace(/-/g,' '); }

// ============================================================================
// API helpers
// ============================================================================
async function fetchJSON(path, opts = {}) {
  const headers = { ...opts.headers };
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const res = await fetch(API + path, { ...opts, headers });
  if (!res.ok) {
    const text = await res.text();
    let msg = text;
    try { msg = JSON.parse(text).message || text; } catch(_) {}
    throw new Error(res.status + ': ' + msg);
  }
  return res.json();
}

// ============================================================================
// Auth
// ============================================================================
let authMode = 'login'; // 'login' | 'register'

function handleAuthClick() {
  if (authToken && userInfo) {
    logout();
    return;
  }
  showAuthModal('login');
}

function showAuthModal(mode) {
  authMode = mode;
  document.getElementById('authTitle').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('nameField').style.display = mode === 'register' ? '' : 'none';
  document.getElementById('btnAuthSubmit').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('authSwitch').innerHTML = mode === 'login'
    ? '没有账号？<a id="linkSwitch">立即注册</a>'
    : '已有账号？<a id="linkSwitch">去登录</a>';
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('authName').value = '';
  document.getElementById('authModal').classList.add('open');
  document.getElementById('linkSwitch').onclick = () => showAuthModal(mode === 'login' ? 'register' : 'login');
}

function hideAuthModal() {
  document.getElementById('authModal').classList.remove('open');
}

async function doAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const displayName = document.getElementById('authName').value.trim() || undefined;
  const errEl = document.getElementById('authError');

  if (!email || !password) {
    errEl.textContent = '请填写邮箱和密码';
    errEl.style.display = '';
    return;
  }

  try {
    const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
    const body = authMode === 'login' ? { email, password } : { email, password, displayName };
    const res = await fetchJSON(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    authToken = res.token;
    userInfo = res.user;
    localStorage.setItem('jwt_token', authToken);
    updateAuthUI();
    hideAuthModal();
    await loadFavorites();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = '';
  }
}

function logout() {
  authToken = null;
  userInfo = null;
  favorites.clear();
  localStorage.removeItem('jwt_token');
  updateAuthUI();
  renderEventList(activeCategory);
}

function updateAuthUI() {
  const btn = document.getElementById('btnAuth');
  if (authToken && userInfo) {
    btn.textContent = userInfo.displayName || userInfo.email || '已登录';
    btn.classList.add('logged-in');
    btn.title = '点击退出登录';
  } else {
    btn.textContent = '登录';
    btn.classList.remove('logged-in');
    btn.title = '登录以收藏事件';
  }
}

async function loadFavorites() {
  if (!authToken) return;
  try {
    const res = await fetchJSON('/api/favorites');
    favorites = new Set((res.data || []).map(f => f.event_id));
  } catch (_) { /* ignore */ }
}

async function toggleFavorite(eventId) {
  if (!authToken) {
    showAuthModal('login');
    return;
  }
  try {
    if (favorites.has(eventId)) {
      await fetchJSON('/api/favorites/' + eventId, { method: 'DELETE' });
      favorites.delete(eventId);
    } else {
      await fetchJSON('/api/favorites', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event_id: eventId })
      });
      favorites.add(eventId);
    }
    renderEventList(activeCategory);
    // refresh detail if open
    const panel = document.getElementById('detailPanel');
    if (panel.dataset.currentId === eventId) showDetail(eventId);
  } catch (err) {
    if (err.message.includes('401')) { logout(); showAuthModal('login'); }
  }
}

// ============================================================================
// Init
// ============================================================================
async function init() {
  document.getElementById('btnAuthSubmit').addEventListener('click', doAuth);
  document.getElementById('btnAuthCancel').addEventListener('click', hideAuthModal);
  document.getElementById('authModal').addEventListener('click', function(e) {
    if (e.target === this) hideAuthModal();
  });

  // Enter key in password field
  document.getElementById('authPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doAuth();
  });

  updateAuthUI();

  try {
    const [evRes, cyRes, ixRes] = await Promise.all([
      fetchJSON('/api/events?limit=100'),
      fetchJSON('/api/cycles'),
      fetchJSON('/api/daily?code=000001&limit=2000')
    ]);
    allEvents = evRes.data || [];
    allCycles = cyRes.data || [];
    dailyData = ixRes.data || [];

    document.getElementById('statEvents').textContent = allEvents.length;
    document.getElementById('statCycles').textContent = allCycles.length;
    if (dailyData.length) {
      document.getElementById('statRange').textContent = dailyData[0].date.slice(0,4) + '–' + dailyData[dailyData.length-1].date.slice(0,4);
    }
    const badge = document.getElementById('statusBadge');
    badge.innerHTML = '<span class="status-dot live"></span>已连接';
    badge.style.color = 'var(--text-secondary)';

    if (authToken) {
      try {
        const me = await fetchJSON('/api/auth/me');
        userInfo = me.user;
        updateAuthUI();
        await loadFavorites();
      } catch (_) { logout(); }
    }

    renderFilters();
    renderEventList(activeCategory);
    drawMiniChart();
    showTodayInHistory();
  } catch (err) {
    console.error(err);
    document.getElementById('statusBadge').innerHTML = '<span class="status-dot"></span>离线';
    document.getElementById('eventList').innerHTML = '<div class="error-state">无法连接后端<br><small>' + err.message + '</small></div>';
  }
}

// ============================================================================
// Today in History
// ============================================================================
async function showTodayInHistory() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const day = now.getDate();
  document.getElementById('todayDate').textContent = month + '月' + day + '日';

  try {
    const res = await fetchJSON('/api/events/today-in-history?month=' + month + '&day=' + day);
    const items = res.data || [];
    const container = document.getElementById('todayItems');
    const panel = document.getElementById('todayPanel');

    if (items.length) {
      container.innerHTML = items.slice(0, 3).map(e =>
        `<div class="today-item" data-id="${e.id}" style="cursor:pointer">
          <span class="t-year">${e.date.slice(0,4)}</span>${e.title_zh}
        </div>`
      ).join('');
      container.querySelectorAll('.today-item').forEach(el => {
        el.addEventListener('click', e => { e.stopPropagation(); showDetail(el.dataset.id); });
      });
      panel.style.display = '';
    } else {
      container.innerHTML = '<div class="today-empty">今天没有历史事件</div>';
      panel.style.display = '';
    }
  } catch (_) {
    document.getElementById('todayPanel').style.display = 'none';
  }
}

// ============================================================================
// Search
// ============================================================================
function onSearch() {
  searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
  renderEventList(activeCategory);
}

// ============================================================================
// Filters
// ============================================================================
function renderFilters() {
  document.getElementById('filterBar').innerHTML = CATEGORIES.map(c =>
    `<span class="filter-chip${c.key===activeCategory?' active':''}" data-key="${c.key}">${c.label}</span>`
  ).join('');
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.addEventListener('click', () => {
      activeCategory = c.dataset.key;
      renderFilters();
      renderEventList(activeCategory);
    });
  });
}

// ============================================================================
// Event-Cycle Mapping
// ============================================================================
function getEventCycle(event) {
  if (!allCycles.length) return null;
  for (const cyc of allCycles) {
    if (event.date >= cyc.start_date && (!cyc.end_date || event.date <= cyc.end_date)) {
      return cyc;
    }
  }
  return null;
}

function jumpToStoryCycle(cycleId) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelector('.tab[data-tab="story"]').classList.add('active');
  document.getElementById('filterBar').style.display = 'none';
  document.getElementById('searchWrap').style.display = 'none';
  document.getElementById('eventList').style.display = 'none';
  document.getElementById('compareView').classList.remove('active');
  document.getElementById('storyView').classList.add('active');
  const cyc = allCycles.find(c => c.id === cycleId);
  if (cyc) showStoryDetail(cyc);
  else renderStoryMode();
}

// ============================================================================
// Event List
// ============================================================================
function renderEventList(cat) {
  let filtered = allEvents;
  if (cat !== 'all') filtered = filtered.filter(e => e.category === cat);
  if (searchTerm) {
    filtered = filtered.filter(e =>
      (e.title_zh || '').toLowerCase().includes(searchTerm) ||
      (e.description_zh || '').toLowerCase().includes(searchTerm) ||
      (e.tags || []).some(t => t.toLowerCase().includes(searchTerm))
    );
  }

  const container = document.getElementById('eventList');
  if (!filtered.length) {
    container.innerHTML = '<div class="no-results">没有匹配的事件</div>';
    return;
  }

  let prevYear = null;
  let html = '<div class="timeline-track"><div class="timeline-line"></div>';

  filtered.forEach(e => {
    const c = catMap[e.category] || catMap.milestone;
    const sh = (e.market_data && e.market_data.sh_close) || e.sh_close;
    const year = e.date.slice(0, 4);
    const isFav = favorites.has(e.id);
    const tags = e.tags || [];

    if (year !== prevYear) {
      html += `<div class="year-separator">${year}</div>`;
      prevYear = year;
    }

    html += `
      <div class="event-card" data-id="${e.id}">
        <div class="dot" style="background:${c.color}"></div>
        <span class="fav-star${isFav?' on':''}" data-fav="${e.id}" title="${isFav?'取消收藏':'收藏'}">${isFav ? '★' : '☆'}</span>
        <div class="event-date">${e.date.slice(5)}</div>
        <div class="event-header">
          <span class="event-badge" style="background:${c.color}">${c.label}</span>
          ${(() => { const cyc = getEventCycle(e); return cyc ? `<span class="cycle-ref ${cyc.type}" data-cycle-id="${cyc.id}" title="${cyc.name_zh}">${cyc.name_zh.slice(0,8)}</span>` : ''; })()}
          <span class="event-title">${e.title_zh}</span>
        </div>
        <div class="event-desc">${e.description_zh || ''}</div>
        ${tags.length ? `<div class="event-tags">${tags.slice(0,4).map(t => `<span class="tag-chip" data-tag="${t}">${tagLabel(t)}</span>`).join('')}</div>` : ''}
        ${sh ? `<div class="event-footer"><span>上证综指收盘</span><span class="index-value">${sh.toLocaleString('en-US')}</span></div>` : ''}
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;

  // Event card click
  container.querySelectorAll('.event-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.closest('.fav-star') || e.target.closest('.tag-chip') || e.target.closest('.cycle-ref')) return;
      showDetail(card.dataset.id);
    });
  });

  // Cycle ref click → jump to story
  container.querySelectorAll('.cycle-ref').forEach(ref => {
    ref.addEventListener('click', function(e) {
      e.stopPropagation();
      jumpToStoryCycle(ref.dataset.cycleId);
    });
  });

  // Favorite star click
  container.querySelectorAll('.fav-star').forEach(star => {
    star.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFavorite(star.dataset.fav);
    });

  container.querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', function(e) {

      searchTerm = tagLabel(chip.dataset.tag).toLowerCase();

    });

}

// ============================================================================
// Enriched data renderer
// ============================================================================
function renderEnrichedData(ev) {
  let html = '';

  // Key numbers
  if (ev.key_numbers && ev.key_numbers.length) {
    html += `<div class="enrich-section"><h3>关键数据</h3><div class="key-numbers-grid">`;
    for (const kn of ev.key_numbers) {
      html += `<div class="kn-card"><div class="kn-label">${kn.label}</div><div class="kn-value">${kn.value}</div></div>`;
    }
    html += `</div></div>`;
  }

  // Affected sectors
  if (ev.affected_sectors && ev.affected_sectors.length) {
    html += `<div class="enrich-section"><h3>影响板块</h3><div class="sector-chips">`;
    for (const s of ev.affected_sectors) {
      const cls = s.impact === 'positive' ? 'sector-up' : 'sector-down';
      const arrow = s.impact === 'positive' ? '↑' : '↓';
      html += `<span class="sector-chip ${cls}">${arrow} ${s.name}</span>`;
    }
    html += `</div></div>`;
  }

  // Notable stocks
  if (ev.notable_stocks && ev.notable_stocks.length) {
    html += `<div class="enrich-section"><h3>知名个股</h3><div class="stocks-table">`;
    for (const s of ev.notable_stocks) {
      html += `<div class="stock-row"><span class="stock-name">${s.name}</span><span class="stock-code">${s.code}</span><span class="stock-role">${s.role}</span></div>`;
    }
    html += `</div></div>`;
  }

  // References
  if (ev.references && ev.references.length) {
    html += `<div class="enrich-section"><h3>原始文献</h3>`;
    for (const r of ev.references) {
      const typeLabel = r.type === 'policy' ? '政策文件' : r.type === 'news' ? '新闻报道' : '参考资料';
      html += `<div class="ref-row"><a href="${r.url}" target="_blank" rel="noopener" class="ref-link">${r.title}</a><span class="ref-type">${typeLabel}</span>${r.date ? `<span class="ref-date">${r.date}</span>` : ''}</div>`;
    }
    html += `</div>`;
  }

  return html;
}

// ============================================================================
// Mini Chart (Line / Candlestick / Line+Volume)
// ============================================================================
function drawMiniChart() {
  const canvas = document.getElementById('miniChart');
  const volCanvas = document.getElementById('volChart');
  if (!dailyData.length) return;

  const container = canvas.parentElement;
  const W = container.clientWidth - 40;
  const mainH = 170, volH = 40;
  canvas.width = W; canvas.height = mainH;
  volCanvas.width = W; volCanvas.height = volH;

  // Sample data
  const step = Math.max(1, Math.floor(dailyData.length / 400));
  sampledForChart = dailyData.filter((_, i) => i % step === 0 || i === dailyData.length - 1);

  if (chartMode === 'candle') {
    drawCandlestick(canvas, sampledForChart, mainH);
    volCanvas.style.display = 'none';
  } else if (chartMode === 'linevol') {
    drawLineChart(canvas, sampledForChart, mainH, 38);
    drawVolume(volCanvas, sampledForChart, volH);
    volCanvas.style.display = '';
  } else {
    drawLineChart(canvas, sampledForChart, mainH, mainH);
    volCanvas.style.display = 'none';
  }
}

function setChartMode(mode) {
  chartMode = mode;
  document.querySelectorAll('.chart-btn').forEach(b => b.classList.toggle('on', b.dataset.mode === mode));
  drawMiniChart();
}

function drawLineChart(canvas, data, H, ch) {
  const pad = { top: 10, right: 10, bottom: H - ch + 18, left: 10 };
  const cw = canvas.width - pad.left - pad.right;
  const chartH = ch - pad.top - 18;

  let maxV = -Infinity, minV = Infinity;
  data.forEach(d => { if (d.close > maxV) maxV = d.close; if (d.close < minV) minV = d.close; });
  const range = maxV - minV || 1;
  maxV += range * 0.05; minV -= range * 0.05;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, H);

  const xPos = i => pad.left + (i / (data.length - 1)) * cw;
  const yPos = v => pad.top + chartH - ((v - minV) / (maxV - minV)) * chartH;

  // Bull/bear bands
  allCycles.forEach(cycle => {
    const sy = parseInt(cycle.start_date.slice(0, 4));
    const ey = parseInt((cycle.end_date || '2026').slice(0, 4));
    let fi = -1, ti = -1;
    data.forEach((d, i) => {
      const y = parseInt(d.date.slice(0, 4));
      if (fi === -1 && y >= sy) fi = i;
      if (y <= ey) ti = i;
    });
    if (fi >= 0 && ti >= fi) {
      ctx.fillStyle = cycle.type === 'bull' ? 'rgba(63,185,80,0.07)' : 'rgba(248,81,73,0.05)';
      ctx.fillRect(xPos(fi), pad.top, xPos(ti) - xPos(fi), chartH);
    }
  });

  // Grid
  ctx.strokeStyle = 'rgba(139,148,158,0.10)'; ctx.lineWidth = 0.5;
  for (let g = 0; g <= 4; g++) {
    const gy = pad.top + (chartH / 4) * g;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(canvas.width - pad.right, gy); ctx.stroke();
  }

  // Line
  ctx.strokeStyle = '#c9a350'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
  ctx.beginPath();
  data.forEach((d, i) => { const px = xPos(i), py = yPos(d.close); i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
  ctx.stroke();

  // Gradient fill
  ctx.lineTo(xPos(data.length - 1), pad.top + chartH);
  ctx.lineTo(xPos(0), pad.top + chartH); ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
  grad.addColorStop(0, 'rgba(201,163,80,0.22)'); grad.addColorStop(1, 'rgba(201,163,80,0.01)');
  ctx.fillStyle = grad; ctx.fill();

  // Year labels
  ctx.fillStyle = '#7D8590'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'center';
  [1990,1995,2000,2005,2010,2015,2020,2026].forEach(year => {
    const idx = data.findIndex(d => parseInt(d.date.slice(0, 4)) >= year);
    if (idx >= 0) ctx.fillText(String(year), xPos(idx), H - 3);
  });

  // Store for tooltip
  canvas._chartMeta = { data, xPos, yPos, minV, maxV, pad };
}

function drawCandlestick(canvas, data, H) {
  const pad = { top: 10, right: 10, bottom: 30, left: 10 };
  const cw = canvas.width - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  let maxV = -Infinity, minV = Infinity;
  data.forEach(d => { if (d.high > maxV) maxV = d.high; if (d.low < minV) minV = d.low; });
  const range = maxV - minV || 1;
  maxV += range * 0.05; minV -= range * 0.05;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, H);

  const xPos = i => pad.left + (i / (data.length - 1)) * cw;
  const yPos = v => pad.top + chartH - ((v - minV) / (maxV - minV)) * chartH;

  // Bull/bear bands
  allCycles.forEach(cycle => {
    const sy = parseInt(cycle.start_date.slice(0, 4));
    const ey = parseInt((cycle.end_date || '2026').slice(0, 4));
    let fi = -1, ti = -1;
    data.forEach((d, i) => {
      const y = parseInt(d.date.slice(0, 4));
      if (fi === -1 && y >= sy) fi = i;
      if (y <= ey) ti = i;
    });
    if (fi >= 0 && ti >= fi) {
      ctx.fillStyle = cycle.type === 'bull' ? 'rgba(63,185,80,0.07)' : 'rgba(248,81,73,0.05)';
      ctx.fillRect(xPos(fi), pad.top, xPos(ti) - xPos(fi), chartH);
    }
  });

  // Grid
  ctx.strokeStyle = 'rgba(139,148,158,0.10)'; ctx.lineWidth = 0.5;
  for (let g = 0; g <= 4; g++) {
    const gy = pad.top + (chartH / 4) * g;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(canvas.width - pad.right, gy); ctx.stroke();
  }

  // Candles
  const candleW = Math.max(1, (cw / data.length) * 0.7);
  const halfW = candleW / 2;
  ctx.lineWidth = 1;

  data.forEach((d, i) => {
    const cx = xPos(i);
    const openY = yPos(d.open || d.close);
    const closeY = yPos(d.close);
    const highY = yPos(d.high || d.close);
    const lowY = yPos(d.low || d.close);
    const isUp = d.close >= (d.open || d.close);

    ctx.strokeStyle = isUp ? '#4daf91' : '#e05660';
    ctx.beginPath(); ctx.moveTo(cx, highY); ctx.lineTo(cx, lowY); ctx.stroke();

    ctx.fillStyle = isUp ? '#4daf91' : '#e05660';
    const bodyTop = Math.min(openY, closeY);
    const bodyH = Math.max(1, Math.abs(closeY - openY));
    ctx.fillRect(cx - halfW, bodyTop, candleW, bodyH);
  });

  // Year labels
  ctx.fillStyle = '#7D8590'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'center';
  [1990,1995,2000,2005,2010,2015,2020,2026].forEach(year => {
    const idx = data.findIndex(d => parseInt(d.date.slice(0, 4)) >= year);
    if (idx >= 0) ctx.fillText(String(year), xPos(idx), H - 3);
  });

  canvas._chartMeta = { data, xPos, yPos, minV, maxV, pad, isCandle: true };
}

function drawVolume(canvas, data, H) {
  const pad = { top: 4, right: 10, bottom: 4, left: 10 };
  const cw = canvas.width - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  let maxV = 0;
  data.forEach(d => { if (d.volume > maxV) maxV = d.volume; });
  if (!maxV) return;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, H);

  const xPos = i => pad.left + (i / (data.length - 1)) * cw;
  const barW = Math.max(1, (cw / data.length) * 0.7);
  const halfW = barW / 2;

  data.forEach((d, i) => {
    const bh = (d.volume / maxV) * chartH;
    const isUp = d.close >= (d.open || d.close);
    ctx.fillStyle = isUp ? 'rgba(63,185,80,0.35)' : 'rgba(248,81,73,0.3)';
    ctx.fillRect(xPos(i) - halfW, pad.top + chartH - bh, barW, bh);
  });
}

// ============================================================================
// Chart Tooltip
// ============================================================================
function initChartTooltip(canvas) {
  const tooltip = document.getElementById('tooltip');

  canvas.addEventListener('mousemove', function(e) {
    const meta = canvas._chartMeta;
    if (!meta) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const scaleX = canvas.width / rect.width;
    const scaledX = mx * scaleX;

    // Find closest data point
    let closestIdx = 0, closestDist = Infinity;
    meta.data.forEach((d, i) => {
      const px = meta.xPos(i);
      const dist = Math.abs(scaledX - px);
      if (dist < closestDist) { closestDist = dist; closestIdx = i; }
    });

    if (closestDist > 30) {
      tooltip.style.display = 'none';
      return;
    }

    const d = meta.data[closestIdx];
    tooltip.querySelector('.tt-date').textContent = d.date;
    const val = meta.isCandle ? d.close : d.close;
    tooltip.querySelector('.tt-val').textContent = val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    tooltip.style.display = '';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 40) + 'px';
  });

  canvas.addEventListener('mouseleave', function() {
    tooltip.style.display = 'none';
  });
}

function initCompareView() {
  const selA = document.getElementById('cmpEventA');
  const selB = document.getElementById('cmpEventB');
  if (selA.options.length > 1) return;

  const sorted = [...allEvents].sort((a, b) => b.date.localeCompare(a.date));
  const opts = sorted.map(e =>
    `<option value="${e.id}">${e.date.slice(0,4)} ${e.title_zh.slice(0,20)}</option>`
  ).join('');
  selA.innerHTML = '<option value="">— 选择事件A —</option>' + opts;
  selB.innerHTML = '<option value="">— 选择事件B —</option>' + opts;

  const evt031 = allEvents.find(e => e.id === 'evt-031');
  const evt046 = allEvents.find(e => e.id === 'evt-046');
  if (evt031) selA.value = 'evt-031';
  if (evt046) selB.value = 'evt-046';

  selA.addEventListener('change', runComparison);
  selB.addEventListener('change', runComparison);
  if (evt031 && evt046) runComparison();
}

async function runComparison() {
  const idA = document.getElementById('cmpEventA').value;
  const idB = document.getElementById('cmpEventB').value;
  if (!idA || !idB) return;

  const evA = allEvents.find(e => e.id === idA);
  const evB = allEvents.find(e => e.id === idB);
  if (!evA || !evB) return;

  const before = 120, after = 120;
  const startA = isoDate(addDays(parseDate(evA.date), -before));
  const endA   = isoDate(addDays(parseDate(evA.date), after));
  const startB = isoDate(addDays(parseDate(evB.date), -before));
  const endB   = isoDate(addDays(parseDate(evB.date), after));

  try {
    const [resA, resB] = await Promise.all([
      fetchJSON(`/api/daily?code=000001&start=${startA}&end=${endA}`),
      fetchJSON(`/api/daily?code=000001&start=${startB}&end=${endB}`)
    ]);
    const dataA = resA.data || [], dataB = resB.data || [];
    if (dataA.length < 10 || dataB.length < 10) return;

    const evDateA = parseDate(evA.date).getTime();
    const evDateB = parseDate(evB.date).getTime();
    let idxA = 0, idxB = 0, minDiffA = Infinity, minDiffB = Infinity;
    dataA.forEach((d, i) => { const diff = Math.abs(new Date(d.date).getTime() - evDateA); if (diff < minDiffA) { minDiffA = diff; idxA = i; } });
    dataB.forEach((d, i) => { const diff = Math.abs(new Date(d.date).getTime() - evDateB); if (diff < minDiffB) { minDiffB = diff; idxB = i; } });

    const winA = dataA.slice(Math.max(0, idxA - 30), Math.min(dataA.length, idxA + 31));
    const winB = dataB.slice(Math.max(0, idxB - 30), Math.min(dataB.length, idxB + 31));
    if (winA.length < 5 || winB.length < 5) return;

    const baseA = winA[0].close, baseB = winB[0].close;
    const retA = winA.map(d => ({ day: d.date, val: ((d.close - baseA) / baseA) * 100 }));
    const retB = winB.map(d => ({ day: d.date, val: ((d.close - baseB) / baseB) * 100 }));

    drawCompareChart(retA, retB, evA, evB);
    renderCompareStats(retA, retB, evA, evB);
  } catch (err) { console.error('Comparison error:', err); }
}

function drawCompareChart(retA, retB, evA, evB) {
  const canvas = document.getElementById('compareChart');
  const container = canvas.parentElement;
  canvas.width = container.clientWidth - 10;
  const W = canvas.width, H = canvas.height;
  const pad = { top: 20, right: 20, bottom: 28, left: 48 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  let minV = Infinity, maxV = -Infinity;
  [...retA, ...retB].forEach(r => { if (r.val < minV) minV = r.val; if (r.val > maxV) maxV = r.val; });
  const range = maxV - minV || 1;
  maxV += range * 0.1; minV -= range * 0.1;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  function drawLine(data, color, lineW) {
    ctx.strokeStyle = color; ctx.lineWidth = lineW; ctx.lineJoin = 'round'; ctx.beginPath();
    data.forEach((r, i) => {
      const px = pad.left + (i / (data.length - 1)) * cw;
      const py = pad.top + ch - ((r.val - minV) / (maxV - minV)) * ch;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.stroke();
  }

  // Grid
  ctx.strokeStyle = 'rgba(139,148,158,0.10)'; ctx.lineWidth = 0.5;
  for (let g = 0; g <= 4; g++) {
    const gy = pad.top + (ch / 4) * g;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(W - pad.right, gy); ctx.stroke();
  }
  // Zero line
  const zy = pad.top + ch - ((0 - minV) / (maxV - minV)) * ch;
  ctx.strokeStyle = 'rgba(139,148,158,0.3)'; ctx.lineWidth = 1;
  ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(pad.left, zy); ctx.lineTo(W - pad.right, zy); ctx.stroke(); ctx.setLineDash([]);

  // Event day marker
  const midX = pad.left + cw / 2;
  ctx.strokeStyle = 'rgba(230,237,243,0.2)'; ctx.lineWidth = 1;
  ctx.setLineDash([2,4]); ctx.beginPath(); ctx.moveTo(midX, pad.top); ctx.lineTo(midX, pad.top + ch); ctx.stroke(); ctx.setLineDash([]);

  drawLine(retA, '#c9a350', 2.2);
  drawLine(retB, '#d48540', 2.2);

  // Y-axis labels
  ctx.fillStyle = '#7D8590'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'right';
  for (let g = 0; g <= 4; g++) {
    const v = minV + (maxV - minV) * (g / 4);
    const gy = pad.top + ch - (g / 4) * ch;
    ctx.fillText(v.toFixed(1) + '%', pad.left - 6, gy + 3);
  }

  ctx.fillStyle = '#7D8590'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('← 事件前', pad.left + cw * 0.2, H - 3);
  ctx.fillText('事件日', midX, H - 3);
  ctx.fillText('事件后 →', pad.left + cw * 0.8, H - 3);

  // Tooltip metadata
  const allPts = [];
  const maxLen = Math.max(retA.length, retB.length);
  for (let i = 0; i < maxLen; i++) {
    const px = pad.left + (i / (maxLen - 1)) * cw;
    allPts.push({ px, a: retA[i], b: retB[i] });
  }
  canvas._cmpMeta = { allPts, minV, maxV, pad, ch, evA, evB };
}

function renderCompareStats(retA, retB, evA, evB) {
  function stats(ret) {
    const vals = ret.map(r => r.val);
    const n = vals.length;
    const totalRet = vals[n-1];
    const maxRet = Math.max(...vals);
    const minRet = Math.min(...vals);
    let peak = vals[0], maxDD = 0;
    vals.forEach(v => { if (v > peak) peak = v; const dd = (peak - v); if (dd > maxDD) maxDD = dd; });
    const mean = vals.reduce((a,b) => a+b, 0) / n;
    const variance = vals.reduce((a,b) => a + (b-mean)**2, 0) / n;
    const vol = Math.sqrt(variance);
    return { totalRet, maxDD, maxRet, minRet, vol };
  }
  const sA = stats(retA), sB = stats(retB);
  const rows = [
    { label: '区间涨跌幅', a: sA.totalRet, b: sB.totalRet, fmt: v => (v>=0?'+':'')+v.toFixed(2)+'%', better: 'higher' },
    { label: '最大回撤', a: sA.maxDD, b: sB.maxDD, fmt: v => '-'+v.toFixed(2)+'%', better: 'lower' },
    { label: '最高收益', a: sA.maxRet, b: sB.maxRet, fmt: v => (v>=0?'+':'')+v.toFixed(2)+'%', better: 'higher' },
    { label: '最低收益', a: sA.minRet, b: sB.minRet, fmt: v => (v>=0?'+':'')+v.toFixed(2)+'%', better: 'higher' },
    { label: '波动率 (σ)', a: sA.vol, b: sB.vol, fmt: v => v.toFixed(2)+'%', better: 'lower' },
  ];
  document.getElementById('compareStats').innerHTML = rows.map(r => {
    const aBetter = r.better === 'higher' ? r.a > r.b : r.a < r.b;
    const bBetter = r.better === 'higher' ? r.b > r.a : r.b < r.a;
    return `<div class="compare-stat">
      <div class="s-label">${r.label}</div>
      <div class="s-values">
        <span class="s-val a" style="${aBetter?'font-weight:800':''}">${r.fmt(r.a)}</span>
        <span class="s-val b" style="${bBetter?'font-weight:800':''}">${r.fmt(r.b)}</span>
      </div>
    </div>`;
  }).join('');
}

// ============================================================================
// Compare chart tooltip
// ============================================================================
function initCompareTooltip(canvas) {
  const tooltip = document.getElementById('tooltip');
  canvas.addEventListener('mousemove', function(e) {
    const meta = canvas._cmpMeta;
    if (!meta) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const scaleX = canvas.width / rect.width;
    const scaledX = mx * scaleX;

    let closest = null, closestDist = Infinity;
    meta.allPts.forEach(pt => {
      const dist = Math.abs(scaledX - pt.px);
      if (dist < closestDist) { closestDist = dist; closest = pt; }
    });

    if (!closest || closestDist > 30) { tooltip.style.display = 'none'; return; }

    const parts = [];
    if (closest.a) parts.push(`<span style="color:#c9a350">A: ${closest.a.val.toFixed(2)}%</span>`);
    if (closest.b) parts.push(`<span style="color:#d48540">B: ${closest.b.val.toFixed(2)}%</span>`);
    tooltip.querySelector('.tt-date').innerHTML = (closest.a || closest.b).day;
    tooltip.querySelector('.tt-val').innerHTML = parts.join(' &nbsp;');
    tooltip.style.display = '';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 40) + 'px';
  });
  canvas.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
}

// ============================================================================
// Utils
// ============================================================================
function parseDate(s) { const p = s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function isoDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

// ============================================================================
// Story Mode
// ============================================================================
let storyViewMode = 'list'; // 'list' | 'detail'
let currentStoryCycle = null;

function renderStoryMode() {
  if (!allCycles.length) {
    document.getElementById('storyView').innerHTML = '<div class="loading"><span class="spinner"></span>加载故事线...</div>';
    return;
  }
  storyViewMode = 'list';
  const sorted = [...allCycles].sort((a, b) => a.start_date.localeCompare(b.start_date));

  function fmtPct(v) { const sign = v >= 0 ? '+' : ''; return sign + v.toFixed(1) + '%'; }

  const html = `
    <div class="story-intro">
      <h3>中国股市的牛熊轮回</h3>
      <p>从1990年上交所开市至今，A股经历了${sorted.length}轮完整的牛熊周期。每一轮牛市都有它的驱动力，每一轮熊市都有它的教训。点击任意周期查看详情。</p>
    </div>
    ${sorted.map(cyc => {
      const peak = cyc.peak_value || cyc.end_value;
      const trough = cyc.trough_value || cyc.start_value;
      const startV = cyc.start_value || 100;
      const endV = cyc.end_value || startV;
      const totalRet = ((endV - startV) / startV) * 100;
      const isBull = cyc.type === 'bull';
      const months = cyc.duration_months || '';
      const keyEvents = (cyc.key_events || []).map(eid => allEvents.find(e => e.id === eid)).filter(Boolean);

      return `<div class="cycle-card ${cyc.type}" data-cycle-id="${cyc.id}">
        <div class="cyc-header">
          <span class="cyc-name">${cyc.name_zh}</span>
          <span class="cyc-badge" style="background:${isBull?'var(--green)':'var(--red)'}">${isBull?'牛市':'熊市'}</span>
        </div>
        <div class="cyc-meta">
          <span>${cyc.start_date.slice(0,7)} → ${(cyc.end_date||'至今').slice(0,7)}</span>
          ${months ? `<span>持续 <strong class="val">${months}</strong> 个月</span>` : ''}
          <span>${startV.toFixed(0)} → ${endV.toFixed(0)} <strong class="val" style="color:${totalRet>=0?'var(--green)':'var(--red)'}">${fmtPct(totalRet)}</strong></span>
        </div>
        <div class="cyc-narrative">${cyc.narrative_zh || ''}</div>
        ${keyEvents.length ? `<div class="cyc-events">${keyEvents.slice(0,5).map(e => `<span class="cyc-event-tag" data-event-id="${e.id}">${e.date.slice(0,4)} ${e.title_zh.slice(0,12)}</span>`).join('')}</div>` : ''}
      </div>`;
    }).join('')}
  `;
  document.getElementById('storyView').innerHTML = html;

  // Cycle card click → show detail
  document.querySelectorAll('.cycle-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.closest('.cyc-event-tag')) return;
      const cycId = card.dataset.cycleId;
      const cyc = allCycles.find(c => c.id === cycId);
      if (cyc) showStoryDetail(cyc);
    });
  });

  // Event tag click → show event detail
  document.querySelectorAll('.cyc-event-tag').forEach(tag => {
    tag.addEventListener('click', function(e) {
      e.stopPropagation();
      showDetail(tag.dataset.eventId);
    });
  });
}

function showStoryDetail(cyc) {
  storyViewMode = 'detail';
  currentStoryCycle = cyc;
  const isBull = cyc.type === 'bull';
  const peak = cyc.peak_value || cyc.end_value;
  const trough = cyc.trough_value || cyc.start_value;
  const startV = cyc.start_value || 100;
  const endV = cyc.end_value || startV;
  const totalRet = ((endV - startV) / startV) * 100;
  const keyEvents = (cyc.key_events || []).map(eid => allEvents.find(e => e.id === eid)).filter(Boolean);

  document.getElementById('storyView').innerHTML = `
    <div style="padding: 8px 0 16px;">
      <button class="chart-btn" onclick="renderStoryMode()" style="font-size:13px;padding:6px 14px;margin-bottom:14px;">← 返回故事线</button>
      <div class="cycle-card ${cyc.type}" style="border-left-width:5px;cursor:default;">
        <div class="cyc-header">
          <span class="cyc-name" style="font-size:19px;">${cyc.name_zh}</span>
          <span class="cyc-badge" style="background:${isBull?'var(--green)':'var(--red)'};font-size:13px;">${isBull?'牛市':'熊市'}</span>
        </div>
        <div class="cyc-meta" style="font-size:14px;">
          <span>${cyc.start_date} → ${cyc.end_date || '至今'}</span>
          ${cyc.duration_months ? `<span>持续 <strong class="val">${cyc.duration_months}</strong> 个月</span>` : ''}
          <span>${startV.toFixed(0)} → ${endV.toFixed(0)} <strong class="val" style="color:${totalRet>=0?'var(--green)':'var(--red)'}">${totalRet>=0?'+':''}${totalRet.toFixed(1)}%</strong></span>
        </div>
        ${peak ? `<div class="cyc-meta" style="margin-bottom:12px;"><span>最高: <strong class="val">${peak.toFixed(0)}</strong> (${cyc.peak_date||''})</span>${trough ? `<span>最低: <strong class="val">${trough.toFixed(0)}</strong> (${cyc.trough_date||''})</span>` : ''}</div>` : ''}
        <div class="cyc-narrative" style="-webkit-line-clamp:unset;">${cyc.narrative_zh || ''}</div>
        ${keyEvents.length ? `
        <div class="cyc-events-section" style="margin-top:16px;">
          <h4>关键事件 (${keyEvents.length})</h4>
          ${keyEvents.map(e => `
            <div class="cyc-event-card" data-event-id="${e.id}">
              <div class="ce-date">${e.date}</div>
              <div class="ce-title">${e.title_zh}</div>
            </div>
          `).join('')}
        </div>` : ''}
      </div>
    </div>
  `;

  // Event card click
  document.querySelectorAll('.cyc-event-card').forEach(c => {
    c.addEventListener('click', () => showDetail(c.dataset.eventId));
  });
}

// ============================================================================
// Stats Dashboard
// ============================================================================
function renderStatsDashboard() {
  if (!allEvents.length || !allCycles.length) {
    document.getElementById('statsView').innerHTML = '<div class="loading"><span class="spinner"></span>加载数据...</div>';
    return;
  }

  // Top single-day gains
  const withData = allEvents.filter(e => e.change_pct != null);
  const topGains = [...withData].sort((a, b) => b.change_pct - a.change_pct).slice(0, 8);
  const topLosses = [...withData].sort((a, b) => a.change_pct - b.change_pct).slice(0, 8);

  // Cycle stats
  const bulls = allCycles.filter(c => c.type === 'bull' && c.end_date);
  const bears = allCycles.filter(c => c.type === 'bear');

  function cycleRet(c) { return ((c.end_value - c.start_value) / c.start_value * 100); }
  function cycleDD(c) { return ((c.peak_value - c.trough_value) / c.peak_value * 100); }

  bulls.sort((a, b) => cycleRet(b) - cycleRet(a));
  bears.sort((a, b) => cycleDD(b) - cycleDD(a));

  // Event density by year
  const yearsCount = {};
  allEvents.forEach(e => { const y = e.date.slice(0,4); yearsCount[y] = (yearsCount[y]||0) + 1; });
  const yearEntries = Object.entries(yearsCount).sort((a,b) => a[0].localeCompare(b[0]));
  const maxYearCount = Math.max(...Object.values(yearsCount));

  // Market extremes
  const eventsWithSh = allEvents.filter(e => e.sh_close != null);
  const highestSh = [...eventsWithSh].sort((a,b) => b.sh_close - a.sh_close).slice(0, 3);
  const lowestSh = [...eventsWithSh].filter(e => e.sh_close > 0).sort((a,b) => a.sh_close - b.sh_close).slice(0, 3);

  document.getElementById('statsView').innerHTML = `
    <div class="stats-grid-2">
      <div class="stats-section">
        <h3><span class="s-icon">&#x1F4C8;</span> 单日最大涨幅</h3>
        <table class="stats-table">
          <tr><th>日期</th><th>事件</th><th class="num">涨跌幅</th></tr>
          ${topGains.map(e => `<tr>
            <td class="dim">${e.date}</td><td>${e.title_zh.slice(0,16)}</td>
            <td class="num up">+${e.change_pct.toFixed(2)}%</td>
          </tr>`).join('')}
        </table>
      </div>
      <div class="stats-section">
        <h3><span class="s-icon">&#x1F4C9;</span> 单日最大跌幅</h3>
        <table class="stats-table">
          <tr><th>日期</th><th>事件</th><th class="num">涨跌幅</th></tr>
          ${topLosses.map(e => `<tr>
            <td class="dim">${e.date}</td><td>${e.title_zh.slice(0,16)}</td>
            <td class="num down">${e.change_pct.toFixed(2)}%</td>
          </tr>`).join('')}
        </table>
      </div>
    </div>

    <div class="stats-section" style="margin-top:22px">
      <h3><span class="s-icon">&#x1F402;</span> 牛市涨幅排行</h3>
      ${bulls.map((c, i) => {
        const ret = cycleRet(c);
        const maxW = 250; // max bar width %
        const barW = Math.min(100, ret / 5);
        return `<div class="stats-bar-row">
          <span class="stats-bar-label">${c.name_zh.slice(0,10)}</span>
          <div class="stats-bar-track"><div class="stats-bar-fill bull" style="width:${barW}%"></div></div>
          <span class="stats-bar-val bull">+${ret.toFixed(0)}%</span>
        </div>`;
      }).join('')}
    </div>

    <div class="stats-section" style="margin-top:22px">
      <h3><span class="s-icon">&#x1F43B;</span> 熊市回撤排行</h3>
      ${bears.map((c, i) => {
        const dd = cycleDD(c);
        return `<div class="stats-bar-row">
          <span class="stats-bar-label">${c.name_zh.slice(0,10)}</span>
          <div class="stats-bar-track"><div class="stats-bar-fill bear" style="width:${Math.min(100, dd)}%"></div></div>
          <span class="stats-bar-val bear">-${dd.toFixed(1)}%</span>
        </div>`;
      }).join('')}
    </div>

    <div class="stats-section" style="margin-top:22px">
      <h3><span class="s-icon">&#x1F4C5;</span> 年度事件密度</h3>
      ${yearEntries.map(([y, c]) => `
        <div class="stats-year-bar">
          <span class="stats-year-label">${y}</span>
          <div class="stats-year-track"><div class="stats-year-fill" style="width:${(c/maxYearCount*100).toFixed(0)}%"></div></div>
          <span class="stats-year-count">${c}</span>
        </div>
      `).join('')}
    </div>

    <div class="stats-grid-2" style="margin-top:22px">
      <div class="stats-section">
        <h3><span class="s-icon">&#x1F680;</span> 最高收盘点位</h3>
        <table class="stats-table">
          ${highestSh.map(e => `<tr><td class="dim">${e.date}</td><td>${e.title_zh.slice(0,14)}</td><td class="num" style="color:var(--accent);font-weight:700">${e.sh_close.toLocaleString('en-US')}</td></tr>`).join('')}
        </table>
      </div>
      <div class="stats-section">
        <h3><span class="s-icon">&#x1F4D0;</span> 牛熊统计概要</h3>
        <table class="stats-table" style="font-size:13px">
          <tr><td class="dim">已完成牛市</td><td class="num">${bulls.length}</td></tr>
          <tr><td class="dim">已完成熊市</td><td class="num">${bears.length}</td></tr>
          <tr><td class="dim">牛市平均涨幅</td><td class="num up">+${(bulls.reduce((s,c) => s+cycleRet(c), 0)/bulls.length).toFixed(0)}%</td></tr>
          <tr><td class="dim">熊市平均回撤</td><td class="num down">-${(bears.reduce((s,c) => s+cycleDD(c), 0)/bears.length).toFixed(1)}%</td></tr>
          <tr><td class="dim">牛市平均持续</td><td class="num">${(bulls.reduce((s,c) => s+(c.duration_months||0), 0)/bulls.length).toFixed(0)} 个月</td></tr>
          <tr><td class="dim">熊市平均持续</td><td class="num">${(bears.reduce((s,c) => s+(c.duration_months||0), 0)/bears.length).toFixed(0)} 个月</td></tr>
          <tr><td class="dim">历史振幅</td><td class="num" style="color:var(--accent)">100 → 6,092</td></tr>
        </table>
      </div>
    </div>
  `;
}

init();
initChartTooltip(document.getElementById('miniChart'));
initCompareTooltip(document.getElementById('compareChart'));
